<!doctype html>
<html lang="id" x-data="rentalApp" x-init="init()">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semua Produk | Aurora Outdoor</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://unpkg.com/alpinejs" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <!-- ==================== TOAST NOTIFICATION ==================== -->
  <div class="toast-container">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="toast" :class="toast.type" x-show="toast.show" x-transition>
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>
  <!-- ==================== HEADER / NAVIGATION ==================== -->
  <header class="header-wrapper">
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="nav-container">
        <!-- LOGO -->
        <div class="logo">
          <a href="index.html"><img src="assets/img/logo.png" alt="Aurora Outdoor Logo" /></a>
        </div>

        <!-- MENU DESKTOP -->
        <ul class="nav-menu desktop">
          <li><a href="product.html" style="color: var(--color-primary); font-weight: 700;">Daftar Alat</a></li>
          <li><a href="cara-booking.html">Cara Booking</a></li>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="tentang-kami.html">Tentang Kami</a></li>
          <li><a href="testimonial.html">Testimonial</a></li>
        </ul>

        <!-- RIGHT SIDE (CART & HAMBURGER) -->
        <div class="nav-actions">
          <!-- CART -->

          <a href="pesanan.html" class="cart-button" aria-label="Buka keranjang">
            <img src="assets/img/cart.png" alt="Keranjang" class="icon-cart" />
            <span class="cart-badge" x-show="cart.length > 0" x-text="cart.length"></span>
          </a>

          <!-- HAMBURGER MENU -->
          <button class="hamburger" @click="navOpen = !navOpen" type="button" aria-label="Toggle menu">
            <img src="assets/img/menu.png" alt="Menu" class="icon-menu" />
          </button>
        </div>
      </div>

      <!-- MOBILE MENU -->
      <ul class="nav-menu mobile" :class="{ 'active': navOpen }">
        <li><a href="product.html" @click="navOpen = false">Daftar Alat</a></li>
        <li><a href="cara-booking.html" @click="navOpen = false">Cara Booking</a></li>
        <li><a href="faq.html" @click="navOpen = false">FAQ</a></li>
        <li><a href="tentang-kami.html" @click="navOpen = false">Tentang Kami</a></li>
        <li><a href="testimonial.html" @click="navOpen = false">Testimonial</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <div class="section-header">
      <h1>Semua Produk</h1>
      <p>Pilih perlengkapan camping terbaik untuk petualanganmu.</p>
    </div>

    <div class="filter-bar ">
      <div class="filter mb-2">
        <template x-for="cat in categories" :key="cat.key">
          <button class="btn btn-outline btn-sm" :class="activeCategory === cat.key ? 'active' : ''"
            @click="activeCategory = cat.key" x-text="cat.label"></button>
        </template>
      </div>
      <div class="search-box mb-2" style="margin-top: 1rem;">
        <input type="text" x-model="searchQuery" placeholder="Cari alat camping..." class="search-input" />
      </div>
    </div>

    <div class="product-grid">
      <template x-for="product in getPaginatedProducts()" :key="product.id">
        <div class="product-card">
          <img :src="product.img" :alt="product.name" @click="openModal(product)" style="cursor:pointer;" />
          <h3 x-text="product.name" @click="openModal(product)" style="cursor:pointer;"></h3>
          <p class="price" x-text="'Rp ' + product.price.toLocaleString() + ' / hari'"></p>
          <button @click="addToCart(product)" class="btn btn-p btn-sm btn-block">+ Tambah</button>
        </div>
      </template>
    </div>

    <div class="pagination" x-show="getTotalPages() > 1">
      <button class="btn btn-outline btn-sm" :disabled="currentPage === 1" @click="previousPage()">&laquo;</button>
      <template x-for="page in Array.from({length: getTotalPages()}, (_, i) => i + 1)" :key="page">
        <button type="button" class="btn btn-outline btn-sm" :class="{ active: currentPage === page }"
          @click="currentPage = page" x-text="page"></button>
      </template>
      <button class="btn btn-outline btn-sm" :disabled="currentPage === getTotalPages()"
        @click="nextPage()">&raquo;</button>
    </div>
  </main>

  <footer class="footer">
    <!-- ...footer unified... -->
  </footer>

  <!-- ==================== PRODUCT DETAIL MODAL ==================== -->
  <div class="modal-overlay" x-show="isModalOpen" @click="isModalOpen = false" x-transition.opacity></div>
  <div class="modal" x-show="isModalOpen" x-transition:enter="modal-enter" x-transition:enter-start="modal-enter-start"
    x-transition:enter-end="modal-enter-end">
    <template x-if="selectedProduct">
      <div class="modal-content">
        <button class="modal-close" @click="isModalOpen = false">&times;</button>
        <div class="modal-body">
          <div class="modal-image">
            <img :src="selectedProduct.img" :alt="selectedProduct.name">
          </div>
          <div class="modal-info">
            <h2 x-text="selectedProduct.name"></h2>
            <p class="modal-category" x-text="selectedProduct.category.toUpperCase()"></p>
            <p class="modal-price">Rp <span x-text="selectedProduct.price.toLocaleString()"></span> / hari</p>
            <div class="modal-description">
              <p x-text="selectedProduct.description"></p>
              <ul>
                <li>✅ Bersih & Higienis</li>
                <li>✅ Kondisi Prima</li>
                <li>✅ Mudah Digunakan</li>
              </ul>
            </div>
            <div class="modal-actions">
              <button class="btn btn-p" @click="addToCart(selectedProduct); isModalOpen = false">🛒 Tambah ke
                Keranjang</button>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script src="assets/js/app.js"></script>

</body>

</html>
